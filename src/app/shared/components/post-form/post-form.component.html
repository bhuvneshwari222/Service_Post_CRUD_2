<form #postForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
        <label for="title">Title<sup class="text-danger">*</sup></label>
        <input required ngModel name="title" #title="ngModel" type="text" class="form-control">
    </div>
    <div class="form-group">
        <label for="content">Content<sup class="text-danger">*</sup></label>
        <textarea required ngModel name="content" #content="ngModel" rows="5" class="form-control"></textarea>
    </div>
    <div class="form-group">
        <label for="isCompleted">IsCompleted<sup class="text-danger">*</sup></label>
        <select name="isCompleted" required ngModel #isCompleted="ngModel" class="form-control">
            <option [ngValue]="true">Yes</option>
            <option [ngValue]="false">No</option>
        </select>
    </div>

    <button *ngIf="!editMode" [disabled]="postForm.invalid" mat-raised-button color="primary" class="w-100">Add Post</button>
    <button (click)="onUpdatePost()" *ngIf="editMode" [disabled]="postForm.invalid" mat-raised-button color="primary" class="w-100">Update Post</button>

</form>
